<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>XPAND - Support</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1629;
      color: #fff;
      margin: 0;
      min-height: 100vh;
      line-height: 1.6;
      position: relative;
      overflow-x: hidden;
    }
    .gradient-tl {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse 400px 400px at 0% 0%, rgba(255,255,255,0.2), transparent);
      pointer-events: none;
    }
    .gradient-br {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse 350px 350px at 100% 100%, rgba(255,255,255,0.15), transparent);
      pointer-events: none;
    }
    .container {
      max-width: 560px;
      margin: 0 auto;
      padding: 48px 24px 64px;
      position: relative;
      z-index: 1;
    }
    .logo {
      font-size: 3.5rem;
      font-weight: 900;
      letter-spacing: -1px;
      margin-bottom: 8px;
      font-family: Georgia, serif;
    }
    .tagline {
      color: rgba(255,255,255,0.75);
      font-size: 1.1rem;
      margin-bottom: 40px;
      font-weight: 500;
    }
    .info {
      color: rgba(255,255,255,0.88);
      margin-bottom: 32px;
    }
    .info p { margin: 0 0 12px; }
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 32px;
    }
    .links a {
      color: #7BCF80;
      text-decoration: none;
      font-weight: 500;
    }
    .links a:hover { text-decoration: underline; }
    .support-email {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid rgba(255,255,255,0.15);
    }
  </style>
</head>
<body>
  <div class="gradient-tl"></div>
  <div class="gradient-br"></div>
  <div class="container">
    <h1 class="logo">XPAND</h1>
    <p class="tagline">Level up your motivation</p>
    <div class="info">
      <p>Complete tasks, earn XP, level up, and build streaks—all with an AI coach that matches your vibe.</p>
      <p>Daily tasks, check-ins, focus mode, and a market to customize your experience.</p>
    </div>
    <div class="links">
      <a href="privacy.html">Privacy Policy</a>
      <a href="terms.html">Terms of Service</a>
    </div>
    <div class="support-email">
      <p><strong>Need help?</strong> Email: <a href="mailto:YOUR_EMAIL@example.com">YOUR_EMAIL@example.com</a></p>
    </div>
  </div>
</body>
</html>
